[LOGS]
directory = logs
file = app.log

[RAW_DATA]
directory = data/raw
filename = Amazon_Reviews

[PROCESSED_DATA]
directory = data/processed
filename = Clean_Amazon_Reviews

[COLUMN_NAMES]
X = Review Text
y = Sentiment

[TRAIN_TEST_SPLIT]
test_size = 0.2
random_state = 42

[TFIDF]
max_features = 5000
stop_words = english

[LOGISTIC_REGRESSION]
max_iter = 500
random_state = 42

[VECTORIZERS]
directory = artifacts/vectorizers
filename = tfidf
file_extension = .pkl

[MODELS]
directory = artifacts/models
filename = logistic_regression
file_extension = .pkl

[TRANSFORMERS]
pretrained_model = nlptown/bert-base-multilingual-uncased-sentiment

[METRICS]
directory = artifacts/metrics
imp_metrics_filename = evaluation
c_matrix_filename = confusion_matrix
c_report_filename = classification_report